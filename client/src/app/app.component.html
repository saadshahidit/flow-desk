<div class="min-h-screen bg-slate-100">
  @if (auth.isLoggedIn()) {
    <nav class="bg-white border-b border-gray-200 px-4 sm:px-6 py-3">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <a routerLink="/dashboard" class="text-xl font-bold text-brand">FlowDesk</a>

        <!-- Desktop nav -->
        <div class="hidden sm:flex items-center gap-6">
          <a routerLink="/dashboard" class="text-sm text-gray-600 hover:text-indigo-600">Dashboard</a>
          <a routerLink="/tasks" class="text-sm text-gray-600 hover:text-indigo-600">Tasks</a>
          @if (auth.isAdmin()) {
            <a routerLink="/members" class="text-sm text-gray-600 hover:text-indigo-600">Members</a>
          }
          <div class="flex items-center gap-3 ml-4">
            <app-avatar [name]="auth.user()?.name || ''" size="sm"></app-avatar>
            <button (click)="auth.logout()" class="text-sm text-gray-500 hover:text-red-500">Logout</button>
          </div>
        </div>

        <!-- Mobile hamburger -->
        <button (click)="mobileMenu.set(!mobileMenu())" class="sm:hidden p-1 text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (!mobileMenu()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            }
          </svg>
        </button>
      </div>

      <!-- Mobile menu -->
      @if (mobileMenu()) {
        <div class="sm:hidden mt-3 pt-3 border-t border-gray-100 space-y-2">
          <a routerLink="/dashboard" (click)="mobileMenu.set(false)" class="block text-sm text-gray-600 hover:text-indigo-600 py-1.5">Dashboard</a>
          <a routerLink="/tasks" (click)="mobileMenu.set(false)" class="block text-sm text-gray-600 hover:text-indigo-600 py-1.5">Tasks</a>
          @if (auth.isAdmin()) {
            <a routerLink="/members" (click)="mobileMenu.set(false)" class="block text-sm text-gray-600 hover:text-indigo-600 py-1.5">Members</a>
          }
          <div class="flex items-center justify-between pt-2 border-t border-gray-100">
            <div class="flex items-center gap-2">
              <app-avatar [name]="auth.user()?.name || ''" size="sm"></app-avatar>
              <span class="text-sm text-gray-700">{{ auth.user()?.name }}</span>
            </div>
            <button (click)="auth.logout()" class="text-sm text-red-500">Logout</button>
          </div>
        </div>
      }
    </nav>
  }
  <router-outlet></router-outlet>
</div>
