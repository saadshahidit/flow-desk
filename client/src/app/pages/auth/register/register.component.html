<div class="min-h-screen flex items-center justify-center bg-slate-100 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-1">Create an account</h1>
    <p class="text-sm text-gray-500 mb-6">Join your team on FlowDesk</p>

    <form (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
        <input type="text" [(ngModel)]="name" name="name" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Your name">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" [(ngModel)]="email" name="email" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="you@example.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" [(ngModel)]="password" name="password" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="••••••••">
      </div>
      @if (error()) {
        <div class="text-sm text-red-600 bg-red-50 px-3 py-2 rounded-lg">{{ error() }}</div>
      }
      <button type="submit" [disabled]="loading()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 text-white font-medium py-2.5 rounded-lg text-sm transition-colors">
        {{ loading() ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="text-sm text-gray-500 text-center mt-4">
      Already have an account? <a routerLink="/login" class="text-indigo-600 hover:underline">Sign in</a>
    </p>
  </div>
</div>
