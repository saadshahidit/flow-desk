<div class="max-w-2xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
  <a routerLink="/tasks" class="text-sm text-indigo-600 hover:underline mb-4 inline-block">&larr; Back to tasks</a>
  <h1 class="text-xl sm:text-2xl font-bold text-gray-900 mb-6">{{ isEdit ? 'Edit Task' : 'New Task' }}</h1>

  <div class="bg-white rounded-xl border border-gray-200 p-4 sm:p-6">
    <form (ngSubmit)="submit()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
        <input type="text" [(ngModel)]="form.title" name="title" required
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Task title">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea [(ngModel)]="form.description" name="description" rows="3"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Task description"></textarea>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Priority</label>
          <select [(ngModel)]="form.priority" name="priority"
            class="custom-select w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Due Date</label>
          <input type="date" [(ngModel)]="form.dueDate" name="dueDate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Assign To</label>
        <select [(ngModel)]="form.assignedTo" name="assignedTo"
          class="custom-select w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="">Unassigned</option>
          @for (m of members(); track m._id) {
            <option [value]="m._id">{{ m.name }}</option>
          }
        </select>
      </div>
      @if (error()) {
        <div class="text-sm text-red-600 bg-red-50 px-3 py-2 rounded-lg">{{ error() }}</div>
      }
      <div class="flex flex-col-reverse sm:flex-row justify-end gap-3">
        <a routerLink="/tasks" class="text-sm px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 text-center">Cancel</a>
        <button type="submit" [disabled]="loading()"
          class="text-sm px-4 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-60 text-white rounded-lg transition-colors">
          {{ loading() ? 'Saving...' : (isEdit ? 'Update Task' : 'Create Task') }}
        </button>
      </div>
    </form>
  </div>
</div>
